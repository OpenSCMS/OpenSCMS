stages:
  - docker-ci-build
  - docker-ci-push
  - qa

default:
  tags:
   - docker

# services:
#   - docker:dind

include:
  - local: ".gitlab-ci/docker.yml"
  - local: ".gitlab-ci/qa-tests.yml"
  - local: ".gitlab-ci/skaffold-qa-tests.yml"

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0 # Force a full clone of all branches
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: 0
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  BASE_RUST_IMAGE: "rust:1-bookworm"
  CI_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  FF_NETWORK_PER_BUILD: "true"
