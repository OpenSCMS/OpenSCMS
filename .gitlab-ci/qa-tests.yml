check source formatting:
  stage: qa
  image: "$CI_IMAGE"
  script:
   - cargo fmt --check
  allow_failure: false

lint source with clippy:
  stage: qa
  image: "$CI_IMAGE"
  script:
   - cargo clippy --locked --no-deps --all-targets
  allow_failure: false

# In an ideal world, this would run in a separate stage. However we run it in the
# qa stage for the following reasons:
#
# 1. By its nature, it also includes the "make sure things compile" check,
#    which is part of qa.
# 2. Running that in a separate stage would require two separate jobs, which
#    would be a waste of resources.
# 3. Kicking this off in parallel with the other qa jobs means it gets done
#    sooner, as this is the longest running job of the pipeline
lgscms unit tests:
  stage: qa
  image: "$CI_IMAGE"
  script:
   - scripts/cargo_unit_tests.sh
  allow_failure: false
