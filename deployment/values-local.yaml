devSecrets:
  mysql:
    enabled: true
    username: scmsuser
    password: password
    connection_string_base: "mysql://{{ .Values.devSecrets.mysql.username }}:{{ .Values.devSecrets.mysql.password }}@mysql:{{ .Values.mysql.port }}"
  rabbitmq:
    enabled: true
    user: rmqadmin
    password: password

mysql:
  external_service:
    enabled: true

ACA:
  enabled: true
  external_service:
    enabled: true

CAM:
  enabled: true
  external_service:
    enabled: true

ECA:
  enabled: true
  external_service:
    enabled: true

LA:
  enabled: true
  external_service:
    enabled: true

RA:
  enabled: true
  external_service:
    enabled: true

rabbitmq:
  replicas: 1

# Enable qfor initial development. Later use a skaffold profile to add it
tools:
  pma:
    enabled: true
  debug_pod:
    enabled: true

