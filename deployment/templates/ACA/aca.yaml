{{- if .Values.ACA.enabled }}
---
apiVersion: apps/v1

kind: Deployment
metadata:
  name: aca-deployment
  labels:
    project: {{ include "openscms.fullname" $ }}
    component: "aca"
    {{- include "openscms.labels" $ | nindent 4 }}

spec:
  replicas: 1
  selector:
    matchLabels:
      component: "aca"
  template:
    metadata:
      labels:
        project: {{ include "openscms.fullname" $ }}
        component: "aca"
    spec:
      hostname: "aca"
      initContainers:
      - name: wait-for-mysql-aca
        image: alpine:3.16
        command:
        - sh
        - -c
        - 'while ! nc -z {{ .Values.mysql.host }} {{ .Values.mysql.port }} ; do echo "Waiting for MySQL is up"; sleep 1; done'
      containers:
      - name: "aca"
        image: "{{ .Values.ACA.image }}"
        command: ["target/debug/aca"]
        imagePullPolicy: "{{ .Values.global.imagePullPolicy }}"
        ports:
          - containerPort: {{ .Values.env.ACA_PORT | int }}
            name: aca-http-api
        envFrom:
          - secretRef:
              name: infra-mysql
          - configMapRef:
              name: env-config
        env:
          - name: MYSQL_DATABASE_NAME
            value: "{{ .Values.ACA.database_name }}"

---
apiVersion: v1
kind: Service
metadata:
  name: aca
  labels:
    project: {{ include "openscms.fullname" $ }}
    component: "aca"

spec:
  type: ClusterIP
  selector:
    component: "aca"
  ports:
    - name: "aca-service-port"
      protocol: TCP
      port: {{ .Values.env.ACA_PORT | int }}
      targetPort: aca-http-api

{{ if .Values.ACA.external_service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: aca-external-service
  labels:
    app.openscms/is-development: 'yes'
    component: aca
spec:
  type: LoadBalancer
  selector:
    component: aca
  ports:
    - name: aca-external-service
      protocol: TCP
      port: {{ .Values.env.ACA_PORT | int }}
      nodePort: {{ .Values.ACA.external_service.nodePort | int }}
      targetPort: aca-http-api
{{- end }}

{{- end }}
