{{ if .Values.devSecrets.rabbitmq.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: scmsrabbitmq-default-user
  labels:
    app.openscms/is-development: 'yes'
type: Opaque
stringData:
  default_user.conf: |
    default_user = {{ .Values.devSecrets.rabbitmq.user }}
    default_pass = {{ .Values.devSecrets.rabbitmq.password }}
  username: {{ .Values.devSecrets.rabbitmq.user }}
  password: {{ .Values.devSecrets.rabbitmq.password }}

---
apiVersion: v1
kind: Secret
metadata:
  name: infra-rabbitmq
  labels:
    app.openscms/is-development: 'yes'
type: Opaque
data:
  RABBITMQ_USERNAME: {{ .Values.devSecrets.rabbitmq.user | b64enc }}
  RABBITMQ_PASSWORD: {{ .Values.devSecrets.rabbitmq.password | b64enc }}
  RABBITMQ_CONNECTION_STRING: {{ tpl "amqp://{{ .Values.devSecrets.rabbitmq.user }}:{{ .Values.devSecrets.rabbitmq.password }}@{{ .Values.rabbitmq.host }}:{{ .Values.rabbitmq.port }}" . | b64enc }}

{{ end }}
