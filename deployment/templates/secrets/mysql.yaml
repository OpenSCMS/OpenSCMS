{{ if .Values.devSecrets.mysql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: infra-mysql
  labels:
    app.lgscms/is-development: 'yes'
type: Opaque
data:
  MYSQL_USERNAME: {{ .Values.devSecrets.mysql.username | b64enc }}
  MYSQL_PASSWORD: {{ .Values.devSecrets.mysql.password | b64enc }}
  MYSQL_CONNECTION_STRING: {{ tpl "mysql://{{ .Values.devSecrets.mysql.username }}:{{ .Values.devSecrets.mysql.password }}@{{ .Values.mysql.host }}:{{ .Values.mysql.port }}" . | b64enc }}
  MYSQL_PORT: {{ .Values.mysql.port | b64enc }}
  MYSQL_HOST: {{ .Values.mysql.host | b64enc }}
{{ end }}
