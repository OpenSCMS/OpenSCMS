{{ if .Values.tools.pma.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debugpod
  labels:
    project: {{ include "lgscms.fullname" . }}
    component: debugpod
    {{- include "lgscms.labels" . | nindent 4 }}

spec:
  replicas:  1
  selector:
    matchLabels:
      component: debugpod
  template:
    metadata:
      labels:
        project: {{ include "lgscms.fullname" . }}
        component: debugpod
    spec:
      containers:
        - name: debugpod
          image: bash
          command:
            - bash
            - -c
            - 'while true; do sleep 5; done'
          envFrom:
            - secretRef:
                name: infra-mysql
            - secretRef:
                name: infra-rabbitmq
            - configMapRef:
                name: env-config
{{ end }}
