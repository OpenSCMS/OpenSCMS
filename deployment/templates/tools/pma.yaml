{{ if .Values.tools.pma.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pma
  labels:
    project: {{ include "lgscms.fullname" . }}
    component: pma
    {{- include "lgscms.labels" . | nindent 4 }}

spec:
  replicas:  1
  selector:
    matchLabels:
      component: pma
  template:
    metadata:
      labels:
        project: {{ include "lgscms.fullname" . }}
        component: pma
    spec:
      containers:
        - name: pma
          image: phpmyadmin/phpmyadmin
          env:
            - name: PMA_HOST
              value: "mysql"
            - name: PMA_PORT
              value: "3306"
            - name: PMA_USER
              valueFrom:
                secretKeyRef:
                  name: infra-mysql
                  key: MYSQL_USERNAME
            - name: PMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-mysql
                  key: MYSQL_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: pma
spec:
  selector:
    component: pma
  ports:
    - protocol: TCP
      nodePort: 30081
      port: 80
      targetPort: 80
  type: LoadBalancer
{{ end }}
